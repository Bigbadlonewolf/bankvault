name: Pytest

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "tests/**"
      - ".github/workflows/pytest.yml"
  pull_request:
    paths:
      - "functions/**"
      - "tests/**"
      - ".github/workflows/pytest.yml"

jobs:
  unit-tests:
    name: Run pytest against mocked Cloud Function code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Run pytest
        run: pytest tests/ -v
