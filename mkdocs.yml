site_name: BankVault
site_description: Just-in-time privilege elevation for a mock mortgage lender, built on GCP Privileged Access Manager.
repo_url: https://github.com/Bigbadlonewolf/bankvault
repo_name: Bigbadlonewolf/bankvault

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Compliance coverage: controls-mapping.md
  - Decision records:
      - "ADR-001: Build vs. Buy, reversed": adr/001-build-vs-buy-jit-broker.md
      - "ADR-002: Two directories is one too many": adr/002-workforce-identity-federation-vs-iap.md
      - "ADR-003: Scope and actor definition": adr/003-scope-and-actor-definition.md
      - "ADR-004: MFA freshness as the signal": adr/004-mfa-freshness-zero-trust-signal.md
      - "ADR-005: Grant lifecycle, detect not contain": adr/005-pam-grant-lifecycle.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - toc:
      permalink: true
